<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Order summary card</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,400;0,500;0,700;0,900;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />

    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body class="container">
    <main class="content">
      <div class="card">
        <img
          class="image-cover"
          src="images/illustration-hero.svg"
          alt="image-cover"
        />
        <div class="card-detail">
          <h3 class="title">Order Summary</h3>
          <p class="description">
            You can now listen to millions of songs, audiobooks, and podcasts on
            any device anywhere you like!
          </p>

          <div class="price-option">
            <img src="images/icon-music.svg" alt="icon-music" />
            <div class="price">
              <div>Annual Plan</div>
              <div>$59.99/year</div>
            </div>
            <a href="#" class="change-price">Change</a>
          </div>

          <div class="btn-actions">
            <div class="btn-proceed">Proceed to Payment</div>
            <div class="btn-cancel">Cancel Order</div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by
        <a href="https://petechu.dev" target="_blank">Phuengton Chummuel</a>.
      </div>
    </footer>
  </body>
</html>
